name: Bulid and test
on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
      - run: docker build -t keroliskhalaf1/simpleweb -f Dockerfile .
      - run: docker run -e CI=true keroliskhalaf1/simpleweb npm test
